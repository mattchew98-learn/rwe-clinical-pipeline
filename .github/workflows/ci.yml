name: ci

on: [push, pull_request]

jobs:
  python:
    name: Python lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff pytest
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests (pytest)
        run: pytest -q

  sql:
    name: dbt SQL lint (no warehouse needed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlfluff
      - name: Lint SQL (sqlfluff)
        run: sqlfluff lint dbt/rwe_dbt/models

  # ─────────────────────────────────────────────────────────────
