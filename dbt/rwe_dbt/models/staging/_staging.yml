version: 2

models:
  - name: stg_patients
    description: "One cleaned row per synthetic patient."
    columns:
      - name: patient_id
        description: "Surrogate patient identifier from Synthea."
        data_tests: [not_null, unique]
      - name: gender
        description: "Normalized to M or F."
        data_tests:
          - accepted_values:
              values: ['M', 'F']

  - name: stg_conditions
    description: "Patient conditions (diagnoses), one row per condition record."
    columns:
      - name: patient_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_patients')
              field: patient_id

  - name: stg_procedures
    description: "Procedures performed, one row per procedure record."
    columns:
      - name: patient_id
        data_tests: [not_null]

  - name: stg_medications
    description: "Medications, one row per medication record. is_active = no stop date."
    columns:
      - name: patient_id
        data_tests: [not_null]
